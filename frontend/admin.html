<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin — Essence Salon & Spa</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <header>
        <h1>🌿 Essence Salon Admin Panel</h1>
        <a href="index.html">← Back to Website</a>
    </header>

    <main class="container">
        <!-- Stats Summary -->
        <div class="stats" id="statsRow">
            <div class="stat-card total">
                <div class="num" id="sTotal">—</div>
                <div class="lbl">Total Bookings</div>
            </div>
            <div class="stat-card pending">
                <div class="num" id="sPending">—</div>
                <div class="lbl">Pending</div>
            </div>
            <div class="stat-card confirmed">
                <div class="num" id="sConfirmed">—</div>
                <div class="lbl">Confirmed</div>
            </div>
            <div class="stat-card completed">
                <div class="num" id="sCompleted">—</div>
                <div class="lbl">Completed</div>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="card">
            <div class="card-head">
                <h2>All Booking Inquiries</h2>
                <button class="refresh-btn" onclick="loadAll()">↺ Refresh</button>
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Service</th>
                            <th>Staff</th>
                            <th>Date / Time</th>
                            <th>Status</th>
                            <th>Received</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                        <tr><td colspan="9" class="loading">Loading bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="assets/js/admin.js"></script>
</body>
</html>
